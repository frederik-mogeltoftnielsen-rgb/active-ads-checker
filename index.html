        .container {

        p {

            color: #E6BD71;
            line-height: 1.6;

        /* Design til Aktive/Inaktive knapperne */
        .status-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            border: 2px solid #E6BD71;
            border-radius: 8px;
            overflow: hidden;
        }
        .status-toggle input[type="radio"] {
            display: none; 
        }
        .status-toggle label {
            flex: 1;
            padding: 14px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #E6BD71;
            background-color: #16322D;
        }
        .status-toggle input[type="radio"]:checked + label {
            background-color: #E6BD71;
            color: #16322D;
            font-weight: bold;
        }

        /* --- Design til den nye søgbare dropdown --- */
        .custom-select-container {
            position: relative;
            width: 100%;
            text-align: left;
        }
        .search-input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background-color: #16322D;
            color: #E6BD71;
            border: 2px solid #E6BD71;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            cursor: text;
            transition: box-shadow 0.3s ease;
        }
        .search-input::placeholder {
            color: rgba(230, 189, 113, 0.6);
        }
        .search-input:focus {
            box-shadow: 0 0 15px rgba(230, 189, 113, 0.4);
        }
        .dropdown-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #16322D;
            border: 2px solid #E6BD71;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 350px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .dropdown-list.active {
            display: block;
        }
        .dropdown-group {
            padding: 12px 16px;
            font-weight: bold;
            background-color: rgba(230, 189, 113, 0.15);
            color: #E6BD71;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .dropdown-item {
            padding: 14px 16px 14px 24px;
            cursor: pointer;
            color: #E6BD71;
            font-size: 18px;
            transition: background-color 0.2s;
        }
        .dropdown-item:hover {
            background-color: rgba(230, 189, 113, 0.2);
        }
        .no-results {
            padding: 16px;
            color: rgba(230, 189, 113, 0.6);
            font-style: italic;
            text-align: center;
        }
        /* Custom scrollbar til dropdown */
        .dropdown-list::-webkit-scrollbar {
            width: 8px;
        }
        .dropdown-list::-webkit-scrollbar-track {
            background: #16322D;
        }
        .dropdown-list::-webkit-scrollbar-thumb {
            background: rgba(230, 189, 113, 0.5);
            border-radius: 4px;
        }
        .dropdown-list::-webkit-scrollbar-thumb:hover {
            background: #E6BD71;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const dropdownList = document.getElementById('dropdownList');
            const dataSelect = document.getElementById('venueSelectData');

            function renderDropdown(filterText = '') {
                dropdownList.innerHTML = '';
                const optgroups = dataSelect.getElementsByTagName('optgroup');
                let hasResults = false;
                const filterLower = filterText.toLowerCase();

                for (let group of optgroups) {
                    const options = group.getElementsByTagName('option');
                    let groupHasVisibleOptions = false;
                    let groupHtml = document.createElement('div');
                    
                    let groupTitle = document.createElement('div');
                    groupTitle.className = 'dropdown-group';
                    groupTitle.textContent = group.label;
                    groupHtml.appendChild(groupTitle);

                    for (let option of options) {
                        if (option.text.toLowerCase().includes(filterLower)) {
                            let item = document.createElement('div');
                            item.className = 'dropdown-item';
                            item.textContent = option.text;
                            
                            item.onclick = function() {
                                openAdsLibrary(option.value);
                            };
                            
                            groupHtml.appendChild(item);
                            groupHasVisibleOptions = true;
                            hasResults = true;
                        }
                    }

                    if (groupHasVisibleOptions) {
                        dropdownList.appendChild(groupHtml);
                    }
                }

                if (!hasResults) {
                    let noRes = document.createElement('div');
                    noRes.className = 'no-results';
                    noRes.textContent = 'Ingen venues fundet...';
                    dropdownList.appendChild(noRes);
                }
            }

            searchInput.addEventListener('focus', () => {
                dropdownList.classList.add('active');
                renderDropdown(searchInput.value);
            });

            searchInput.addEventListener('input', (e) => {
                renderDropdown(e.target.value);
            });

            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !dropdownList.contains(e.target)) {
                    dropdownList.classList.remove('active');
                }
            });

            function openAdsLibrary(fbPageId) {
                dropdownList.classList.remove('active');
                searchInput.value = ''; 
                renderDropdown(''); 

                const statusRadios = document.getElementsByName("adStatus");
                let selectedStatus = "active"; 
                for (const radio of statusRadios) {
                    if (radio.checked) {
                        selectedStatus = radio.value;
                        break;
                    }
                }

                if (fbPageId) {
                    // LINK OPDATERET MED &search_type=page FOR AT LØSE META FEJLEN
                    const metaUrl = `https://www.facebook.com/ads/library/?active_status=${selectedStatus}&ad_type=all&country=DK&search_type=page&view_all_page_id=${fbPageId}`;
                    window.open(metaUrl, '_blank');
                }
            }
        });
    </script>
