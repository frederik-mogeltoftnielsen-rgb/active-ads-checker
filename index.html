        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border-top: 6px solid #E6BD71; /* Sekundær farve som flot top-kant */
        }
        .logo {
            max-width: 180px; /* Juster denne værdi for at gøre logoet større/mindre */
            margin-bottom: 20px;
            height: auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            margin-top: 0;
            color: #16322D; /* Primær farve til overskriften */
        }
        p {
            margin-bottom: 25px;
            color: #555;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 25px;
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: #16322D; /* Primær farve når dropdown er valgt */
        }
        .btn {
            display: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #E6BD71; /* Sekundær farve til tekst */
            background-color: #16322D; /* Primær farve til knap */
            border: 2px solid #16322D;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #E6BD71; /* Bytter om på farverne ved hover */
            color: #16322D;
            border-color: #E6BD71;
        }
    </style>
</head>
