<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekom A/S | Aktive Meta Annoncer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .btn {
            display: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #0066cc;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tjek Aktive Annoncer 🍻</h1>
        <p>Vælg dit venue herunder for at se aktive Meta annoncer.</p>

        <select id="venueSelect" onchange="updateLink()">
            <option value="">-- Vælg dit Venue --</option>
            
            <optgroup label="København">
                <option value="123456789012345">Aloha Beach Bar CPH (8882)</option> 
                <option value="INDSÆT_FB_ID_HER">Andys Bar CPH (0337)</option>
                <option value="INDSÆT_FB_ID_HER">Cafe Guldhornene CPH (3898)</option>
            </optgroup>

            <optgroup label="Aalborg">
                <option value="INDSÆT_FB_ID_HER">Cafe Guldhornene Aalborg (3044)</option>
                <option value="INDSÆT_FB_ID_HER">Heidis Bier Bar Aalborg (8403)</option>
            </optgroup>
            
            <optgroup label="Aarhus">
                <option value="INDSÆT_FB_ID_HER">Cafe Guldhornene Aarhus (2483)</option>
                <option value="INDSÆT_FB_ID_HER">Heidis Bier Bar Aarhus (5140)</option>
            </optgroup>

            </select>

        <a id="adsBtn" class="btn" href="#" target="_blank">Se annoncer i Ads Library</a>
    </div>

    <script>
        function updateLink() {
            const select = document.getElementById("venueSelect");
            const btn = document.getElementById("adsBtn");
            const fbPageId = select.value;

            if (fbPageId && fbPageId !== "INDSÆT_FB_ID_HER") {
                // Bygger Meta Ads Library URL'en med det valgte Page ID
                const metaUrl = `https://www.facebook.com/ads/library/?active_status=all&ad_type=all&country=DK&view_all_page_id=${fbPageId}`;
                btn.href = metaUrl;
                btn.style.display = "block"; // Viser knappen
            } else {
                btn.style.display = "none"; // Skjuler knappen hvis intet gyldigt er valgt
            }
        }
    </script>

</body>
</html>
